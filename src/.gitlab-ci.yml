image: docker:27

services:
  - docker:27-dind

stages:
  - test
  - build

before_script:
  - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

test:
  stage: test
  script:
    - echo "Running test stage"
  only:
    - tags
  tags:
    - gitlab-org-docker

build-tag:
  stage: build
  script:
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  only:
    - tags
  tags:
    - gitlab-org-docker
